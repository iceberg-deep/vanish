name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (editable + dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pyflakes

      - name: Lint (pyflakes)
        run: python -m pyflakes vanish tests

      - name: Run test suite
        # The suite is hermetic: the DB is redirected to a tmp dir and the
        # network is blocked in conftest, so no secrets or HIBP key are needed.
        run: pytest -q
